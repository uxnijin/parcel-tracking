<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Access restricted — ShipFlow</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="dead-end">
  <div class="code">Error 403</div>
  <i class="ti ti-lock" aria-hidden="true"></i>
  <h1>You don't have access to this workspace</h1>
  <p>This area is limited to workspace admins. Ask an admin to grant you access, or switch to a workspace you belong to.</p>
  <div class="flex gap-2">
    <button class="btn-primary" onclick="location.href='index.html'"><i class="ti ti-home" aria-hidden="true"></i>Go to dashboard</button>
    <button onclick="toast('Access request sent to your admin')"><i class="ti ti-mail" aria-hidden="true"></i>Request access</button>
  </div>
</div>
<script src="js/app.js"></script>
</body>
</html>
