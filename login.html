<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — ShipFlow</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/styles.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--surface-0); }
  .auth-card { width: 360px; max-width: 92vw; }
  .auth-brand { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: var(--sp-6); font-size: 15px; font-weight: 500; }
  .auth-brand .mark { width: 24px; height: 24px; border-radius: var(--radius-sm); background: var(--fill-primary); color: var(--on-primary); display: flex; align-items: center; justify-content: center; font-size: 12px; }
  h1.auth-title { font-size: 18px; text-align: center; margin-bottom: 4px; }
  .auth-sub { font-size: 13px; color: var(--text-secondary); text-align: center; margin-bottom: var(--sp-6); }
  .sso-btn { width: 100%; justify-content: center; margin-bottom: 8px; }
  .divider { display: flex; align-items: center; gap: 10px; margin: var(--sp-4) 0; color: var(--text-muted); font-size: 12px; }
  .divider::before, .divider::after { content: ""; flex: 1; height: 0.5px; background: var(--border); }
  .field input { width: 100%; }
  .field-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .auth-submit { width: 100%; justify-content: center; }
  .auth-footer { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: var(--sp-4); }
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-brand"><span class="mark">SF</span>ShipFlow</div>
  <h1 class="auth-title">Sign in</h1>
  <p class="auth-sub">Use your work account to access your workspace</p>

  <button class="sso-btn"><i class="ti ti-brand-google" aria-hidden="true"></i>Continue with Google</button>
  <button class="sso-btn"><i class="ti ti-brand-windows" aria-hidden="true"></i>Continue with Microsoft</button>

  <div class="divider">or</div>

  <div class="form-error" id="form-error"><i class="ti ti-alert-circle" aria-hidden="true"></i>That email and password combination doesn't match our records.</div>

  <form id="login-form" onsubmit="return handleLogin(event)">
    <div class="field">
      <label for="email">Work email</label>
      <input type="text" id="email" placeholder="you@company.com" required />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="text" id="password" placeholder="••••••••" required />
      <p class="field-hint">Demo build — enter <strong>demo</strong> to sign in, or anything else to see the error state.</p>
    </div>
    <button type="submit" class="btn-primary auth-submit" id="submit-btn">Sign in</button>
  </form>

  <p class="auth-footer">Don't have access? <a href="#" style="text-decoration:underline;color:var(--text-primary)">Request an invite</a></p>
</div>

<script src="js/app.js"></script>
<script>
  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById("submit-btn");
    const err = document.getElementById("form-error");
    err.classList.remove("visible");
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader-2" aria-hidden="true"></i>Signing in…';
    setTimeout(() => {
      const pw = document.getElementById("password").value;
      if (pw !== "demo") {
        err.classList.add("visible");
        btn.disabled = false;
        btn.textContent = "Sign in";
        return;
      }
      location.href = "index.html";
    }, 900);
    return false;
  }
</script>
</body>
</html>
